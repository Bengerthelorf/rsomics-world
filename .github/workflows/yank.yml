name: Yank from crates.io
on:
  workflow_dispatch:
    inputs:
      crate:
        description: 'Crate name (e.g. rsomics-fastp)'
        required: true
        type: string
      version:
        description: 'Version to yank (e.g. 0.2.0)'
        required: true
        type: string

jobs:
  yank:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo yank
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo yank --version "${{ inputs.version }}" "${{ inputs.crate }}"
