name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: ubuntu-latest,     triple: x86_64-unknown-linux-gnu  }
          - { os: ubuntu-24.04-arm,  triple: aarch64-unknown-linux-gnu }
          - { os: macos-15-intel,    triple: x86_64-apple-darwin       }
          - { os: macos-14,          triple: aarch64-apple-darwin      }
        toolchain: [stable, "1.91"]
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup toolchain install ${{ matrix.toolchain }} --profile minimal
      - run: rustup default ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features
