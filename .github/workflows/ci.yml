name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly full-matrix sweep (incl. x86_64-apple-darwin) catches a
    # regression that lands on main between release tags. Per-push CI runs
    # a fast lane only; release.yml validates all four targets on every tag.
    - cron: "0 6 * * 1"

concurrency:
  # A newer push to the same ref supersedes an in-flight run. main is
  # gated authoritatively by the tag → release path, so cancelling a
  # superseded mid-stack commit here trades nothing for not dogpiling
  # GitHub's scarcest runner pools under fine-grained push cadence.
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: ISA-L build toolchain (isal-sys → rsomics-igzip)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends nasm autoconf automake libtool
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # Per-push runs a minimal fast lane: Linux x86_64 (the truth, runs
  # compat tests), the same OS at MSRV (a rustc-version gate, OS-
  # independent for pure-Rust code), and one macOS (the only platform
  # that has ever broken this repo — GH-image rustup poisoning). aarch64-
  # Linux and x86_64-apple-darwin are covered by release.yml on every tag
  # and by the weekly schedule matrix here, so they need not burn scarce
  # macOS/extra minutes on every fine-grained push. macOS labels are the
  # moving `*-latest` alias, not version-pinned, to avoid label rot.
  matrix-prep:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set.outputs.include }}
    steps:
      - id: set
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MATRIX='[
              {"os":"ubuntu-latest","toolchain":"stable"},
              {"os":"ubuntu-latest","toolchain":"1.91"},
              {"os":"ubuntu-24.04-arm","toolchain":"stable"},
              {"os":"ubuntu-24.04-arm","toolchain":"1.91"},
              {"os":"macos-latest","toolchain":"stable"},
              {"os":"macos-latest","toolchain":"1.91"},
              {"os":"macos-15-intel","toolchain":"stable"},
              {"os":"macos-15-intel","toolchain":"1.91"}
            ]'
          else
            MATRIX='[
              {"os":"ubuntu-latest","toolchain":"stable"},
              {"os":"ubuntu-latest","toolchain":"1.91"},
              {"os":"macos-latest","toolchain":"stable"}
            ]'
          fi
          echo "include=$(echo "$MATRIX" | tr -d '\n ')" >> "$GITHUB_OUTPUT"

  test:
    needs: matrix-prep
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.matrix-prep.outputs.include) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Sanitize poisoned rustup binaries on macOS images
        if: runner.os == 'macOS'
        run: |
          rm -rf "$HOME/.cargo/bin" "$HOME/.rustup"
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Verify toolchain install is not poisoned
        run: |
          # Catches the rustup-init-masquerade case where `rustc` actually
          # prints rustup-init's version string. Fail loud, not silent —
          # the previous mode was a cryptic "unexpected argument" error
          # mid-test; this surfaces it during setup with a diagnostic.
          if rustc -vV 2>&1 | grep -qi rustup-init; then
            echo "::error::rustc is rustup-init in disguise — runner image is poisoned"
            ls -la "$HOME/.cargo/bin/" "$HOME/.rustup/toolchains/" 2>&1 || true
            exit 1
          fi
          rustc --version
      - uses: Swatinem/rust-cache@v2
      - name: Install upstream binaries for compat tests (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # fastp + samtools via apt are kept (recent enough versions);
          # seqkit's apt package is too old to emit the modern `--all`
          # column layout the compat test parses, so pull the upstream
          # static binary instead. Architecture-aware (amd64 / arm64).
          sudo apt-get install -y --no-install-recommends fastp samtools bedtools
          # isal-sys (rsomics-igzip ② FFI) builds ISA-L from C+asm via autotools+nasm.
          sudo apt-get install -y --no-install-recommends nasm autoconf automake libtool
          arch=$(uname -m)
          case "$arch" in
            x86_64)  seqkit_arch=amd64 ;;
            aarch64) seqkit_arch=arm64 ;;
            *) echo "unsupported arch $arch for seqkit fetch" >&2 ; exit 1 ;;
          esac
          curl -fsSL -o /tmp/seqkit.tar.gz \
            "https://github.com/shenwei356/seqkit/releases/download/v2.13.0/seqkit_linux_${seqkit_arch}.tar.gz"
          tar -xzf /tmp/seqkit.tar.gz -C /tmp
          sudo install -m 0755 /tmp/seqkit /usr/local/bin/seqkit
          fastp --version
          samtools --version | head -1
          seqkit version
          bedtools --version
      - name: Install upstream binaries for compat tests (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install fastp seqkit samtools bedtools
          # No nasm/autotools on macOS: isal-sys is a Linux-only dep; seqio
          # uses its pure-Rust backend off Linux (rsomics-igzip is a stub there).
          fastp --version
          samtools --version | head -1
          seqkit version
          bedtools --version
      - name: Resolve toolchain cargo + rustc
        run: |
          # ~/.cargo/bin proxies on GH's macOS images intermittently
          # masquerade as rustup-init — and cargo's internal `rustc`
          # invocation can hit the bad proxy even when the cargo binary
          # itself is fine, because cargo resolves rustc by PATH lookup.
          # Resolve BOTH binaries to their absolute toolchain paths and
          # prepend that dir to PATH so any other subprocess wins too.
          BIN=$(find "$HOME/.rustup/toolchains" -maxdepth 3 -type d -name bin | head -n 1)
          if [ -z "$BIN" ]; then
            BIN="$HOME/.cargo/bin"
          fi
          echo "TOOLCHAIN_CARGO=$BIN/cargo" >> "$GITHUB_ENV"
          echo "RUSTC=$BIN/rustc" >> "$GITHUB_ENV"
          echo "$BIN" >> "$GITHUB_PATH"
          "$BIN/cargo" --version
          "$BIN/rustc" --version
      - name: cargo test
        run: |
          "$TOOLCHAIN_CARGO" test --workspace --all-features
