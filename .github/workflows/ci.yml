name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: ubuntu-latest,     triple: x86_64-unknown-linux-gnu  }
          - { os: ubuntu-24.04-arm,  triple: aarch64-unknown-linux-gnu }
          - { os: macos-15-intel,    triple: x86_64-apple-darwin       }
          - { os: macos-15,          triple: aarch64-apple-darwin      }
        toolchain: [stable, "1.91"]
    runs-on: ${{ matrix.target.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Sanitize poisoned rustup binaries on macOS images
        if: runner.os == 'macOS'
        run: |
          rm -rf "$HOME/.cargo/bin" "$HOME/.rustup"
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path --default-toolchain none
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Verify toolchain install is not poisoned
        run: |
          # Catches the rustup-init-masquerade case where `rustc` actually
          # prints rustup-init's version string. Fail loud, not silent —
          # the previous mode was a cryptic "unexpected argument" error
          # mid-test; this surfaces it during setup with a diagnostic.
          if rustc -vV 2>&1 | grep -qi rustup-init; then
            echo "::error::rustc is rustup-init in disguise — runner image is poisoned"
            ls -la "$HOME/.cargo/bin/" "$HOME/.rustup/toolchains/" 2>&1 || true
            exit 1
          fi
          rustc --version
      - uses: Swatinem/rust-cache@v2
      - name: Install upstream fastp for compat tests
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fastp
          fastp --version
      - name: Resolve toolchain cargo
        run: |
          # The ~/.cargo/bin proxies (cargo, rustup) on GH's macOS images
          # intermittently masquerade as rustup-init. Hop straight to the
          # toolchain's cargo binary to dodge the proxy entirely.
          CARGO=$(find "$HOME/.rustup/toolchains" -maxdepth 3 -path '*/bin/cargo' -type f | head -n 1)
          if [ -z "$CARGO" ]; then CARGO="$(command -v cargo)"; fi
          echo "TOOLCHAIN_CARGO=$CARGO" >> "$GITHUB_ENV"
          "$CARGO" --version
      - name: cargo test
        run: |
          "$TOOLCHAIN_CARGO" test --workspace --all-features
