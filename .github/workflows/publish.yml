name: Publish to crates.io
on:
  push:
    tags:
      - 'rsomics-*-v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to re-publish (e.g. rsomics-fasta-stats-v0.1.0)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Parse tag → crate + version
        id: parse
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG##*-v}"
          CRATE="${TAG%-v*}"
          echo "crate=$CRATE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify Cargo.toml version matches tag
        run: |
          MANIFEST=$(find crates -mindepth 3 -maxdepth 5 -path "*/${{ steps.parse.outputs.crate }}/Cargo.toml" | head -n 1)
          if [ -z "$MANIFEST" ]; then
            echo "::error::no Cargo.toml found for ${{ steps.parse.outputs.crate }}"
            exit 1
          fi
          CARGO_VER=$(grep '^version' "$MANIFEST" | head -n 1 | sed -E 's/.*"(.+)".*/\1/')
          if [ "$CARGO_VER" != "${{ steps.parse.outputs.version }}" ]; then
            echo "::error::tag ${{ steps.parse.outputs.version }} ≠ Cargo.toml $CARGO_VER (manifest: $MANIFEST)"
            exit 1
          fi

      - name: Install upstream binaries for compat tests
        run: |
          # The compat tests assert these are on PATH (fail-loud if missing).
          # See ci.yml for the same install step.
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fastp samtools bedtools
          # isal-sys (rsomics-igzip ② FFI) builds ISA-L from C+asm via autotools+nasm.
          sudo apt-get install -y --no-install-recommends nasm autoconf automake libtool
          arch=$(uname -m)
          case "$arch" in
            x86_64)  seqkit_arch=amd64 ;;
            aarch64) seqkit_arch=arm64 ;;
            *) echo "unsupported arch $arch for seqkit fetch" >&2 ; exit 1 ;;
          esac
          curl -fsSL -o /tmp/seqkit.tar.gz \
            "https://github.com/shenwei356/seqkit/releases/download/v2.13.0/seqkit_linux_${seqkit_arch}.tar.gz"
          tar -xzf /tmp/seqkit.tar.gz -C /tmp
          sudo install -m 0755 /tmp/seqkit /usr/local/bin/seqkit
          sudo apt-get install -y --no-install-recommends hyperfine
          fastp --version
          seqkit version
          bedtools --version
          hyperfine --version

      - name: cargo test
        run: cargo test -p ${{ steps.parse.outputs.crate }} --all-features

      - name: perf gate (>1.0x vs upstream — contract enforced)
        run: scripts/perf-ci.sh ${{ steps.parse.outputs.crate }}

      - name: cargo publish (dry-run)
        run: cargo publish -p ${{ steps.parse.outputs.crate }} --dry-run

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p ${{ steps.parse.outputs.crate }}
