# perfgate release manifest — the per-tool >1.0x contract, machine-readable.
#
# Every Layer-B tool crate MUST appear here as exactly one of:
#   [spec.<crate>]    full perfgate spec; publish runs it and blocks if <=1.0x
#   [exempt.<crate>]  reason = "..."; no single-binary upstream to bench
# A Layer-B tool crate that is neither (or marked needs_spec) BLOCKS publish:
# a port ships only once it is proven strictly faster than its reference.
#
# Placeholders in *_args: FIX = input fixture, FIX2 = second input,
# OUT = scratch output. fixture/fixture2 = "<kind>:<a>:<b>" for
# scripts/mkfixture.py (kind ∈ fasta|fastq|bed).

[spec.rsomics-fasta-stats]
fixture          = "fasta:50000:1000"
ours_args        = "-t 1 FIX"
upstream_bin     = "seqkit"
upstream_args    = "stats -j 1 FIX"
upstream_version = "seqkit version"

[spec.rsomics-fastq-stats]
# The --all path is FASTQ's distinguishing cost: a per-base quality scan
# (Q20/Q30/AvgQual) on top of the length/GC pass. The enforced gate must
# cover it, so both sides run the extended path single-threaded.
fixture          = "fastq:200000:150"
ours_args        = "-t 1 --all FIX"
upstream_bin     = "seqkit"
upstream_args    = "stats -j 1 -a FIX"
upstream_version = "seqkit version"

[spec.rsomics-fastq-filter]
# gz input: .fastq.gz is the real workload rsomics-seqio's igzip backend
# wins; the enforced gate must cover the gz read+filter hot path this crate
# now depends on. Same flag pairing compat.rs validated byte-equal vs fastp.
fixture          = "fastqgz:1000000:150"
ours_args        = "-t 1 --in1 FIX --out1 OUT"
upstream_bin     = "fastp"
upstream_args    = "--thread 1 -i FIX -o OUT --disable_adapter_trimming --disable_trim_poly_g --json /dev/null --html /dev/null"
upstream_version = "fastp --version"

[spec.rsomics-fastq-trim]
# gz input (not plain): .fastq.gz is the universal sequencer distribution
# format and the workload rsomics-seqio's igzip backend exists to win. Plain
# fastq-trim is already proven (3.88x); the enforced gate must cover the gz
# decode+trim hot path this crate now depends on. Both sides read the same
# single-member gzip; outputs are plain so only the read path differs.
fixture          = "fastqgz:300000:150"
ours_args        = "-t 1 -a AGATCGGAAGAGCACACGTCTGAACTCCAGTCAC --in1 FIX --out1 OUT"
upstream_bin     = "fastp"
upstream_args    = "--thread 1 --adapter_sequence AGATCGGAAGAGCACACGTCTGAACTCCAGTCAC -i FIX -o OUT --disable_quality_filtering --json /dev/null --html /dev/null"
upstream_version = "fastp --version"

[spec.rsomics-fastq-umi]
# gz input (the real workload). fastp isolated to UMI-only (everything else
# disabled) so both sides do the same work: read .fastq.gz, move the 8 bp 5'
# UMI into the read name, write plain. Reference upstream = fastp 0.20.1.
fixture          = "fastqgz:1000000:150"
ours_args        = "-t 1 --umi_len 8 --in1 FIX --out1 OUT"
upstream_bin     = "fastp"
upstream_args    = "--thread 1 --umi --umi_loc read1 --umi_len 8 -i FIX -o OUT --disable_adapter_trimming --disable_quality_filtering --disable_length_filtering --disable_trim_poly_g --json /dev/null --html /dev/null"
upstream_version = "fastp --version"

[spec.rsomics-fastq-split]
# gz input, --split_by_lines (deterministic both sides; the byte-equal mode).
# 400000 lines = 100k reads/file over 1M reads → 10 split files. Both write
# <digits>.<basename OUT> next to OUT in the space-free scratch dir; perfgate
# times throughput only (distinct ours/upstream OUT bases, no collision).
fixture          = "fastqgz:1000000:150"
ours_args        = "-t 1 --split_by_lines 400000 --in1 FIX --out1 OUT"
upstream_bin     = "fastp"
upstream_args    = "--thread 1 --split_by_lines 400000 -i FIX -o OUT --disable_adapter_trimming --disable_quality_filtering --disable_length_filtering --disable_trim_poly_g --json /dev/null --html /dev/null"
upstream_version = "fastp --version"

[spec.rsomics-fastq-correct]
# gz input (the real workload). BFC is the k-mer-spectrum corrector
# reference; it emits corrected reads to stdout (perfgate redirects each
# side's stdout to a scratch file). 100k×150 ≈ 15 Mbp: `-s 20m` is the
# correct, generous bloom size for that — `-s 100m` made bfc allocate
# ~2.1 GB and run ~2 s/invocation regardless of input (×13 hyperfine runs
# → the gate timed out); sizing `-s` to the fixture is exactly how bfc
# is run in practice and is the fair comparison. The ratio is
# fixture-size-invariant (both sides see the identical input).
fixture          = "fastqgz:100000:150"
ours_args        = "-t 1 --in1 FIX --out1 OUT"
upstream_bin     = "bfc"
upstream_args    = "-s 20m -k 33 -t 1 FIX"
upstream_version = "bfc -v"

[spec.rsomics-bed-merge]
fixture          = "bed:2000000:24"
ours_args        = "-i FIX"
upstream_bin     = "bedtools"
upstream_args    = "merge -i FIX"
upstream_version = "bedtools --version"

[spec.rsomics-bed-sort]
# coreutils `sort` is the universal pre-sort idiom bedtools itself documents.
fixture          = "bed:2000000:24"
ours_args        = "-i FIX"
upstream_bin     = "sort"
upstream_args    = "-k1,1 -k2,2n FIX"
upstream_version = "sort --version"

[exempt.rsomics-pvalue-adjust]
reason = "No standalone C/Python/R *binary* upstream — R's p.adjust is a library function, not a CLI tool. The perf contract targets ports of standalone binaries; covered instead by an in-crate criterion micro-bench."

[spec.rsomics-bed-intersect]
# CLI + upstream verified from src/main.rs (-a/-b/-o) and tests/compat.rs.
fixture          = "bed:1500000:24"
fixture2         = "bed:1500000:24"
ours_args        = "-a FIX -b FIX2"
upstream_bin     = "bedtools"
upstream_args    = "intersect -a FIX -b FIX2"
upstream_version = "bedtools --version"

[spec.rsomics-bed-subtract]
fixture          = "bed:1500000:24"
fixture2         = "bed:1500000:24"
ours_args        = "-a FIX -b FIX2"
upstream_bin     = "bedtools"
upstream_args    = "subtract -a FIX -b FIX2"
upstream_version = "bedtools --version"

[spec.rsomics-bed-complement]
# mkfixture `bed` sorts rows by (chrom-str, start) and `genome` emits the
# same lexicographic chrom order ⇒ bedtools complement accepts the pairing.
fixture          = "bed:2000000:24"
fixture2         = "genome:24:0"
ours_args        = "-i FIX -g FIX2"
upstream_bin     = "bedtools"
upstream_args    = "complement -i FIX -g FIX2"
upstream_version = "bedtools --version"

# fastp 0.20.1 (4090) has no dedup flag; ours `--mode full` (exact
# full-sequence) pairs fairly with `seqkit rmdup -s` (exact by-seq) —
# same operation, both available. (`--mode bin` is fastp-D-style lossy,
# no available binary upstream on 4090.)
[spec.rsomics-fastq-dedup]
fixture          = "fastq:1000000:150"
ours_args        = "-i FIX -o OUT --mode full"
upstream_bin     = "seqkit"
upstream_args    = "rmdup -s FIX -o OUT"
upstream_version = "seqkit version"
