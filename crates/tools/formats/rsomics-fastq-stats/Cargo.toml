[package]
name = "rsomics-fastq-stats"
version = "0.1.0"
description = "Per-file statistics for FASTQ files (num_seqs, sum_len, N50, GC%, Q20/Q30%, AvgQual, …) — Rust port of `seqkit stats` (FASTQ)."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"
categories = ["science", "command-line-utilities"]
keywords = ["fastq", "bioinformatics", "n50", "quality", "seqkit"]

[[bin]]
name = "rsomics-fastq-stats"
path = "src/main.rs"

[dependencies]
rsomics-common = { path = "../../../foundation/rsomics-common", version = "0.5" }
rsomics-help = { path = "../../../foundation/rsomics-help", version = "0.3" }
rsomics-seqstats = { path = "../../../foundation/rsomics-seqstats", version = "0.2" }
clap = { workspace = true, features = ["derive"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
anyhow.workspace = true
needletail = { version = "0.7", default-features = false, features = ["compression"] }

[dev-dependencies]
rsomics-common = { path = "../../../foundation/rsomics-common", version = "0.5", features = ["test-support", "rayon"] }
tempfile = "3"
criterion.workspace = true

[[bench]]
name = "fastq_stats"
harness = false

[lints]
workspace = true
