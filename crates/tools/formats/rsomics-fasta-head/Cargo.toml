[package]
name = "rsomics-fasta-head"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Output the first N FASTA records — seqkit head equivalent for FASTA"

[[bin]]
name = "rsomics-fasta-head"
path = "src/main.rs"

[dependencies]
rsomics-common = { path = "../../../foundation/rsomics-common", version = "0.5" }
rsomics-help = { path = "../../../foundation/rsomics-help", version = "0.3" }
clap.workspace = true
needletail = { version = "0.7", default-features = false, features = ["compression"] }

[lints]
workspace = true
