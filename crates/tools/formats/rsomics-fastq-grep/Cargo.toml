[package]
name = "rsomics-fastq-grep"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Filter FASTQ records by read name pattern — seqkit grep equivalent"

[[bin]]
name = "rsomics-fastq-grep"
path = "src/main.rs"

[dependencies]
rsomics-common = { path = "../../../foundation/rsomics-common", version = "0.5" }
rsomics-help = { path = "../../../foundation/rsomics-help", version = "0.3" }
rsomics-seqio = { path = "../../../foundation/rsomics-seqio", version = "0.1" }
clap.workspace = true
regex = "1"

[lints]
workspace = true
