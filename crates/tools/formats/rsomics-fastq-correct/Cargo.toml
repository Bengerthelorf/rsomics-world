[package]
name = "rsomics-fastq-correct"
version = "0.1.0"
description = "FASTQ k-mer-spectrum substitution-error correction. Independent Rust port of BFC (lh3): trusted-k-mer threshold + best-first correction walk. SE and PE."
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
readme = "README.md"
categories = ["science", "command-line-utilities"]
keywords = ["fastq", "bioinformatics", "error-correction", "kmer", "bfc"]

[[bin]]
name = "rsomics-fastq-correct"
path = "src/main.rs"

[lib]
name = "rsomics_fastq_correct"
path = "src/lib.rs"

[dependencies]
rsomics-common = { path = "../../../foundation/rsomics-common", version = "0.5" }
rsomics-seqio = { path = "../../../foundation/rsomics-seqio", version = "0.1" }
rsomics-fqgz = { path = "../../../foundation/rsomics-fqgz", version = "0.1" }
rsomics-kmer = { path = "../../../foundation/rsomics-kmer", version = "0.1" }
rsomics-help = { path = "../../../foundation/rsomics-help", version = "0.3" }
clap = { workspace = true, features = ["derive"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
anyhow.workspace = true
rayon.workspace = true

[dev-dependencies]
rsomics-common = { path = "../../../foundation/rsomics-common", version = "0.5", features = ["test-support", "rayon"] }
tempfile = "3"
criterion.workspace = true

[[bench]]
name = "fastq_correct"
harness = false

[lints]
workspace = true
