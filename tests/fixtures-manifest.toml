# Public benchmark data manifest.
#
# Tier 1 fixtures live in git under `tests/golden/` per crate and are not
# listed here. Tier 2 fixtures are downloaded on demand by CI and dev shells
# into `tests/fixtures-cache/` (gitignored). Tier 3 and 4 fixtures are
# provisioned out-of-band and consumed via `BCMR_BENCH_DATA`.
#
# Schema:
#   name      slug, used as the cache filename stem
#   tier      2 | 3 | 4
#   url       HTTPS source (must be a stable URL; GitHub Releases or EBI/NCBI)
#   sha256    hex digest of the downloaded file
#   size_mb   approximate size in megabytes (for disk-quota planning)
#   license   SPDX or short tag for the source's redistribution terms
#   source    human-readable origin (consortium, paper, accession)
#
# Reproducibility note for fixtures-v0.1: 50k paired-end reads simulated by
# wgsim -S 42 -N 50000 -1 150 -2 150 -e 0.005 -d 350 from GRCh38 chr22
# (UCSC), then aligned via minimap2 -ax sr | samtools sort | samtools index.
# Seed = 42; output is byte-for-byte deterministic. Generation script lives
# in the fixtures-v0.1 release description.

[[fixture]]
name = "chr22_sub_r1.fastq.gz"
tier = 2
url = "https://github.com/Bengerthelorf/rsomics-world/releases/download/fixtures-v0.1/chr22_sub_r1.fastq.gz"
sha256 = "d2352e5bf78797c2a1bd68c60316519678b9eb30b10d195b634b48ac70725ab9"
size_mb = 4
license = "CC0-1.0"
source = "wgsim-simulated PE reads from GRCh38 chr22 (UCSC); seed 42"

